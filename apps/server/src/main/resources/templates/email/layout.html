<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title th:text="${subject}">Email</title>
    <style>
      @media only screen and (max-width: 620px) {
        .container {
          width: 100% !important;
          padding: 20px !important;
        }
        .card {
          padding: 24px !important;
        }
        .hero {
          font-size: 20px !important;
        }
      }
    </style>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f4f6f9;
      font-family: Arial, Helvetica, sans-serif;
      color: #333;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      style="background: #f4f6f9; padding: 30px 0"
    >
      <tr>
        <td align="center">
          <table
            class="container"
            width="600"
            cellpadding="0"
            cellspacing="0"
            role="presentation"
            style="width: 600px; max-width: 95%; background: transparent"
          >
            <tr>
              <td style="padding: 0 0 20px 0; text-align: center">
                <!-- header -->
                <div style="display: inline-block; text-align: center">
                  <!-- troque por img inline/cid se quiser logo -->
                  <div style="font-weight: 700; font-size: 20px; color: #111">
                    <span th:text="${companyName}">Minha Empresa</span>
                  </div>
                  <div style="height: 6px"></div>
                </div>
              </td>
            </tr>

            <tr>
              <td>
                <table
                  class="card"
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  role="presentation"
                  style="
                    background: #ffffff;
                    border-radius: 12px;
                    padding: 36px;
                    box-shadow: 0 8px 30px rgba(16, 24, 40, 0.08);
                  "
                >
                  <tr>
                    <td>
                      <div th:fragment="layout(content)">
                        <div th:insert="${content}"></div>
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td style="padding-top: 18px; text-align: center">
                <div style="font-size: 13px; color: #9aa0a6">
                  Precisa de ajuda? Escreva para
                  <a
                    th:href="'mailto:' + ${supportEmail}"
                    th:text="${supportEmail}"
                    style="color: #6b7280; text-decoration: underline"
                    >suporte</a
                  >
                </div>
                <div style="margin-top: 8px; font-size: 12px; color: #b0b6bb">
                  © <span th:text="${year}">2026</span>
                  <span th:text="${companyName}">Formio</span>. Todos os
                  direitos reservados.
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
