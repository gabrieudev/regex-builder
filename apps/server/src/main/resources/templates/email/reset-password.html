<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{email/layout :: layout(~{::body})}"
>
  <body>
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
      <tr>
        <td align="center">
          <div style="text-align: center; padding-bottom: 10px">
            <h1
              style="margin: 0; font-size: 26px; color: #111; font-weight: 700"
            >
              Redefinir sua senha
            </h1>
          </div>

          <div
            style="
              text-align: center;
              color: #4b5563;
              font-size: 15px;
              line-height: 1.6;
              padding-bottom: 20px;
            "
          >
            Olá <strong th:text="${name}">Usuário</strong>,<br />
            Recebemos uma solicitação para redefinir sua senha.<br />
            Clique no botão abaixo para criar uma nova senha.
          </div>

          <div style="text-align: center; padding-bottom: 26px">
            <a
              th:href="${actionUrl}"
              style="
                background: #ef4444;
                color: #ffffff;
                text-decoration: none;
                padding: 14px 28px;
                border-radius: 10px;
                display: inline-block;
                font-weight: 600;
                letter-spacing: 0.2px;
              "
            >
              Redefinir senha
            </a>
          </div>

          <div
            style="
              text-align: center;
              font-size: 13px;
              color: #6b7280;
              line-height: 1.5;
              padding-bottom: 18px;
            "
          >
            Se o botão não funcionar, copie e cole este link:
            <div style="word-break: break-all; padding-top: 8px">
              <a
                th:href="${actionUrl}"
                th:text="${actionUrl}"
                style="color: #ef4444; text-decoration: underline"
              >
                https://...
              </a>
            </div>
          </div>

          <div style="text-align: center; font-size: 13px; color: #9ca3af">
            Caso não tenha solicitado, ignore este e-mail ou contate
            <a
              th:href="'mailto:' + ${supportEmail}"
              th:text="${supportEmail}"
              style="color: #6b7280; text-decoration: underline"
            >
              suporte </a
            >.
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
